version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tuhora_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tuhora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tuhora_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tuhora_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tuhora']
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: PgAdmin para visualizar la DB en el browser
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tuhora_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tuhora.app
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
